<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f1e" />
  <title>Asistencia Vial · General Belgrano</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://googleapis.com" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f1e; --surf: #111827; --surf2: #1e293b; --border: #1e3a5f;
      --accent: #f97316; --danger: #ef4444; --safe: #22c55e; --text: #f1f5f9; --muted: #94a3b8;
    }
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); font-family: 'Barlow', sans-serif; color: var(--text); min-height: 100dvh; margin: 0; padding: 20px; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(30,58,95,.12) 1px, transparent 1px), linear-gradient(90deg, rgba(30,58,95,.12) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .card { background: var(--surf); border: 1px solid var(--border); border-radius: 20px; max-width: 420px; margin: 20px auto; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,.5); position: relative; z-index: 1; }
    h2 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 2rem; text-transform: uppercase; letter-spacing: 0.05em; text-align: center; color: #fff; margin-bottom: 4px; }
    .sub { text-align: center; font-size: 0.9rem; color: var(--muted); margin-bottom: 24px; }
    label { display: block; text-align: left; margin: 14px 0 6px; font-weight: 600; font-size: 0.95rem; color: #cbd5e1; }
    .field { background: var(--surf2); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-size: 1.05rem; padding: 12px 16px; width: 100%; outline: none; }
    .field:focus { border-color: var(--accent); }
    .btn-box { display: flex; gap: 12px; margin-top: 28px; }
    .btn { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.3rem; text-transform: uppercase; letter-spacing: .04em; border: none; border-radius: 14px; color: #fff; padding: 16px 10px; cursor: pointer; flex: 1; transition: transform .1s; }
    .btn:active { transform: scale(.96); }
    .btn-blue { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); box-shadow: 0 4px 15px rgba(37,99,235,0.3); }
    .btn-red { background: linear-gradient(135deg, var(--accent) 0%, #dc2626 100%); box-shadow: 0 4px 15px rgba(220,38,38,0.3); }
    .coords-card { margin-top: 28px; background: linear-gradient(135deg, #0d1f3c 0%, #0f1a2e 100%); border: 1.5px solid #1e3a5f; border-radius: 14px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
    .coord-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.35rem; color: #38bdf8; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; font-size: .75rem; font-weight: 700; padding: 4px 12px; margin: 0 auto 15px; width: fit-content; }
    .b-on { background: rgba(34,197,94,.1); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
    .b-off { background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
  </style>
</head>
<body>

<div class="card">
    <div id="badge-net" class="status-badge b-on"><span class="w-2 h-2 rounded-full bg-current animate-pulse"></span><span id="badge-txt">SISTEMA ONLINE</span></div>
    <h2>Central de Auxilio</h2>
    <div class="sub">General Belgrano & Radio 100km</div>
    
    <label>Nombre del Conductor</label>
    <input type="text" id="nombre" class="field" placeholder="Ej: Juan Pérez" oninput="localStorage.setItem('g_nombre', this.value)">
    
    <label>Patente del Vehículo</label>
    <input type="text" id="patente" class="field" placeholder="Ej: AF123AA" oninput="localStorage.setItem('g_patente', this.value)">

    <div class="btn-box">
        <button class="btn btn-blue" onclick="enviarSiniestro('Solo Grúa')">🛠️ Sólo Grúa</button>
        <button class="btn btn-red" onclick="enviarSiniestro('Grúa + Auto de Renta')">🚗 Grúa + Renta</button>
    </div>

    <div class="coords-card">
        <div>
            <div style="font-size: .7rem; font-weight:600; color:var(--muted); letter-spacing:.1em; text-transform:uppercase;">UBICACIÓN SATELITAL</div>
            <div id="coord" class="coord-val">Buscando coordenadas...</div>
        </div>
    </div>
</div>

<script>
    // Configuración obligatoria del negocio
    var WEBHOOK_URL = "https://hook.us2.make.com/nhxc79dqg1tys1rfk3yhwe17huv8k4j0";
    var SMS_NUMBER  = "+5491122410900";

    // Recupera la memoria local del teléfono
    document.getElementById('nombre').value = localStorage.getItem('g_nombre') || '';
    document.getElementById('patente').value = localStorage.getItem('g_patente') || '';

    // Monitoreo visual de la red
    function chequearRed() {
        var b = document.getElementById('badge-net');
        var t = document.getElementById('badge-txt');
        if(navigator.onLine) {
            b.className = "status-badge b-on"; t.innerText = "SISTEMA ONLINE";
        } else {
            b.className = "status-badge b-off"; t.innerText = "MODO CONTINGENCIA RURAL (OFFLINE)";
        }
    }
    window.addEventListener('online', chequearRed);
    window.addEventListener('offline', chequearRed);
    chequearRed();

    // Gestión del chip de localización
    var lat = "0", lon = "0";
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(function(pos) {
            lat = pos.coords.latitude.toFixed(4);
            lon = pos.coords.longitude.toFixed(4);
            document.getElementById('coord').innerText = lat + " , " + lon;
        }, function() {
            document.getElementById('coord').innerText = "GPS sin señal o apagado";
        }, { enableHighAccuracy: true });
    }

    function enviarSiniestro(tipoServicio) {
        var nombre = document.getElementById('nombre').value.trim();
        var patente = document.getElementById('patente').value.trim();

        if (!nombre || !patente) {
            alert("Por favor, complete su Nombre y Patente para continuar.");
            return;
        }

        if (navigator.onLine) {
            // ENVÍO DIGITAL POR INTERNET
            fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    Nombre: nombre,
                    Patente: patente,
                    Lat: lat,
                    Lon: lon,
                    Servicio: tipoServicio
                })
            })
            .then(function() { alert("¡Auxilio solicitado! Asistencia despachada para " + tipoServicio); })
            .catch(function() { alert("Error al conectar. Intente nuevamente."); });
        } else {
            // ENVÍO OFFLINE COMPRIMIDO POR SMS RURAL
            var abreviado = (tipoServicio === 'Solo Grúa') ? 'SOLO' : 'RENTA';
            var cuerpoSms = "SOS|" + patente + "|" + lat + "|" + lon + "|" + abreviado;
            window.location.href = "sms:" + SMS_NUMBER + "?body=" + encodeURIComponent(cuerpoSms);
        }
    }
</script>

</body>
</html>
